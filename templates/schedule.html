{% extends "base.html" %}
{% block content %}
<div class="schedule-page">
    <div class="schedule-header">
        <span class="schedule-title">SEASON SCHEDULE</span>
        <span class="schedule-year" id="sched-year"></span>
    </div>
    <div class="schedule-list" id="schedule-list">
        <div class="sched-empty">Loading schedule...</div>
    </div>
</div>

<script>
let _scheduleLoaded = false;

document.addEventListener('f1:update', (e) => {
    const { session } = e.detail;
    if (session?.year) {
        document.getElementById('sched-year').textContent = session.year;
    }
    if (!_scheduleLoaded) loadSchedule();
});

async function loadSchedule() {
    try {
        const res = await fetch('/api/schedule');
        if (!res.ok) return;
        const data = await res.json();
        _scheduleLoaded = true;
        renderSchedule(data.schedule);
    } catch (e) {
        console.warn('[schedule] fetch failed:', e);
    }
}

function renderSchedule(events) {
    const list = document.getElementById('schedule-list');
    if (!events || events.length === 0) {
        list.innerHTML = '<div class="sched-empty">No schedule data available.</div>';
        return;
    }

    const now = new Date();

    list.innerHTML = events.map(ev => {
        const eventDate = new Date(ev.date);
        const isPast    = eventDate < now;
        const sessions  = ev.sessions || [];

        // Find the next upcoming session
        const nextSession = sessions.find(s => new Date(s.date) > now);
        const raceSession = sessions.find(s => s.name === 'Race');
        const isNext      = nextSession && !isPast;

        let countdownHtml = '';
        if (nextSession && !isPast) {
            const diff = new Date(nextSession.date) - now;
            countdownHtml = `<span class="sched-countdown">${fmtCountdown(diff)}</span>`;
        }

        const sessionRows = sessions.map(s => {
            const d    = new Date(s.date);
            const past = d < now;
            return `
                <div class="sched-session-row ${past ? 'past' : ''}">
                    <span class="sched-session-name">${s.name}</span>
                    <span class="sched-session-date mono">${fmtDate(d)}</span>
                </div>`;
        }).join('');

        return `
            <div class="sched-event ${isPast ? 'past' : ''} ${isNext ? 'next' : ''}"
                 onclick="toggleEvent(this)">
                <div class="sched-event-header">
                    <div class="sched-event-left">
                        <span class="sched-round mono">R${ev.round}</span>
                        <div class="sched-event-info">
                            <span class="sched-event-name">${ev.name}</span>
                            <span class="sched-event-location">${ev.location}, ${ev.country}</span>
                        </div>
                    </div>
                    <div class="sched-event-right">
                        ${countdownHtml}
                        <span class="sched-event-date mono">${fmtDateShort(eventDate)}</span>
                        ${isNext ? '<span class="sched-next-badge">NEXT</span>' : ''}
                    </div>
                </div>
                <div class="sched-sessions" style="display:none">
                    ${sessionRows}
                </div>
            </div>`;
    }).join('');
}

function toggleEvent(el) {
    const sessions = el.querySelector('.sched-sessions');
    if (sessions) {
        sessions.style.display = sessions.style.display === 'none' ? 'block' : 'none';
    }
}

function fmtDate(d) {
    return d.toLocaleString('en-GB', {
        day: '2-digit', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
    });
}

function fmtDateShort(d) {
    return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

function fmtCountdown(ms) {
    if (ms <= 0) return '';
    const days  = Math.floor(ms / 86400000);
    const hours = Math.floor((ms % 86400000) / 3600000);
    const mins  = Math.floor((ms % 3600000)  / 60000);
    if (days > 0)  return `${days}d ${hours}h`;
    if (hours > 0) return `${hours}h ${mins}m`;
    return `${mins}m`;
}

// Reload schedule once on page load
loadSchedule();
</script>
{% endblock %}
