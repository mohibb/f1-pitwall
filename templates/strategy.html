{% extends "base.html" %}
{% block content %}
<div class="strategy-page">
    <div class="strategy-header">
        <span class="strategy-title">TYRE STRATEGY</span>
        <span class="strategy-lap" id="strat-current-lap"></span>
    </div>
    <div class="strategy-chart-wrap">
        <svg id="strategy-svg" class="strategy-svg"></svg>
    </div>
</div>

<script>
const COMPOUND_COLOURS = {
    SOFT:    '#e8002d',
    MEDIUM:  '#ffd700',
    HARD:    '#ffffff',
    INTER:   '#39b54a',
    WET:     '#0067ff',
    UNKNOWN: '#888888',
};

const ROW_HEIGHT    = 32;
const ROW_GAP       = 6;
const LABEL_WIDTH   = 52;
const PADDING_TOP   = 24;
const PADDING_RIGHT = 16;

let _lastDrivers = null;
let _lastSession = null;

document.addEventListener('f1:update', (e) => {
    const { drivers, session } = e.detail;
    if (!drivers || Object.keys(drivers).length === 0) return;

    _lastDrivers = drivers;
    _lastSession = session;

    render(drivers, session);
});

function render(drivers, session) {
    const totalLaps   = session?.total_laps || 0;
    const currentLap  = session?.current_lap || 0;

    if (!totalLaps) return;

    const sorted = Object.entries(drivers)
        .filter(([, d]) => d.position != null)
        .sort(([, a], [, b]) => a.position - b.position);

    if (sorted.length === 0) return;

    const svg        = document.getElementById('strategy-svg');
    const container  = svg.parentElement;
    const totalWidth = container.clientWidth || 800;
    const chartWidth = totalWidth - LABEL_WIDTH - PADDING_RIGHT;
    const totalHeight = PADDING_TOP + sorted.length * (ROW_HEIGHT + ROW_GAP);

    svg.setAttribute('width', totalWidth);
    svg.setAttribute('height', totalHeight);
    svg.setAttribute('viewBox', `0 0 ${totalWidth} ${totalHeight}`);

    const lapToX = (lap) => LABEL_WIDTH + (lap / totalLaps) * chartWidth;

    let html = '';

    // Lap axis ticks
    const tickEvery = totalLaps <= 30 ? 5 : totalLaps <= 60 ? 10 : 15;
    for (let l = 0; l <= totalLaps; l += tickEvery) {
        const x = lapToX(l);
        html += `<line x1="${x}" y1="${PADDING_TOP - 8}" x2="${x}" y2="${totalHeight}" stroke="var(--border)" stroke-width="1"/>`;
        html += `<text x="${x}" y="${PADDING_TOP - 10}" text-anchor="middle" class="axis-label">${l}</text>`;
    }

    // Driver rows
    sorted.forEach(([abbr, d], rowIdx) => {
        const y = PADDING_TOP + rowIdx * (ROW_HEIGHT + ROW_GAP);
        const midY = y + ROW_HEIGHT / 2;

        // Driver label
        html += `
            <text x="${LABEL_WIDTH - 6}" y="${midY + 5}" text-anchor="end" class="driver-label">
                <tspan style="fill:${d.team_colour || '#fff'}">${abbr}</tspan>
            </text>`;

        // Build stints from lap data — we only have current compound/tyre_life
        // so we render a single bar representing current stint
        const stints = buildStints(abbr, d);

        stints.forEach(stint => {
            const x1 = lapToX(stint.startLap);
            const x2 = lapToX(Math.min(stint.endLap, totalLaps));
            const w  = Math.max(x2 - x1, 2);
            const colour = COMPOUND_COLOURS[(stint.compound || 'UNKNOWN').toUpperCase()] || '#888';

            html += `
                <rect x="${x1}" y="${y + 4}" width="${w}" height="${ROW_HEIGHT - 8}"
                      fill="${colour}" opacity="0.85" rx="3"
                      data-driver="${abbr}" data-compound="${stint.compound}"
                      data-start="${stint.startLap}" data-end="${stint.endLap}"/>`;

            // Tyre age label inside bar if wide enough
            if (w > 28) {
                const label = `${(stint.compound || '?')[0]}·${stint.endLap - stint.startLap}`;
                html += `
                    <text x="${x1 + w / 2}" y="${midY + 4}" text-anchor="middle"
                          class="stint-label" fill="${colour === '#ffffff' ? '#000' : '#fff'}">
                        ${label}
                    </text>`;
            }
        });

        // Pit stop markers
        const pitLaps = getPitLaps(abbr, d);
        pitLaps.forEach(lap => {
            const x = lapToX(lap);
            html += `
                <line x1="${x}" y1="${y + 2}" x2="${x}" y2="${y + ROW_HEIGHT - 2}"
                      stroke="var(--muted)" stroke-width="1.5" stroke-dasharray="3,2"/>`;
        });
    });

    // Current lap marker
    if (currentLap > 0) {
        const x = lapToX(currentLap);
        html += `
            <line x1="${x}" y1="${PADDING_TOP - 8}" x2="${x}" y2="${totalHeight}"
                  stroke="var(--accent)" stroke-width="1.5"/>`;
        html += `
            <text x="${x + 3}" y="${PADDING_TOP - 10}" class="axis-label" fill="var(--accent)">
                L${currentLap}
            </text>`;
    }

    svg.innerHTML = html;

    // Update lap counter
    const lapEl = document.getElementById('strat-current-lap');
    if (lapEl && currentLap && totalLaps) {
        lapEl.textContent = `LAP ${currentLap} / ${totalLaps}`;
    }
}

function buildStints(abbr, d) {
    // We have current compound and tyre_life from the state.
    // Without full lap history in the frontend, we approximate:
    // work backwards from current lap using tyre_life to find stint start.
    const currentLap = _lastSession?.current_lap || 0;
    const pitStops   = d.pit_stops || 0;
    const tyreLife   = d.tyre_life || 0;
    const compound   = d.compound || 'UNKNOWN';

    if (!currentLap) return [];

    const stintStart = Math.max(1, currentLap - tyreLife + 1);

    const stints = [];

    // Previous stints — we don't have full history, so render placeholders
    // evenly distributed before current stint
    if (pitStops > 0) {
        const lapsBeforeCurrentStint = stintStart - 1;
        const lapsPerPrevStint = Math.floor(lapsBeforeCurrentStint / pitStops);
        for (let i = 0; i < pitStops; i++) {
            stints.push({
                compound: 'UNKNOWN',
                startLap: 1 + i * lapsPerPrevStint,
                endLap:   1 + (i + 1) * lapsPerPrevStint,
            });
        }
    }

    // Current stint
    stints.push({
        compound: compound,
        startLap: stintStart,
        endLap:   currentLap,
    });

    return stints;
}

function getPitLaps(abbr, d) {
    // Approximate pit laps from stint boundaries
    const stints = buildStints(abbr, d);
    return stints.slice(0, -1).map(s => s.endLap);
}

window.addEventListener('resize', () => {
    if (_lastDrivers && _lastSession) render(_lastDrivers, _lastSession);
});
</script>
{% endblock %}
