{% extends "base.html" %}
{% block content %}
<div class="timing-tabs" id="timing-tabs">
    <button class="timing-tab active" id="tab-timing" onclick="switchTab('timing')">DASHBOARD</button>
    <button class="timing-tab" id="tab-map" onclick="switchTab('map')">MAP</button>
</div>
<div class="timing-page">
    <div class="timing-panel">
    <table class="timing-table" id="timing-table">
        <thead>
            <tr>
                <th class="col-pos">POS</th>
                <th class="col-driver">DRIVER</th>
                <th class="col-lap">LAST LAP</th>
                <th class="col-lap">BEST LAP</th>
                <th class="col-gap">GAP</th>
                <th class="col-gap">INT</th>
                <th class="col-tyre">TYRE</th>
                <th class="col-sector">S1</th>
                <th class="col-sector">S2</th>
                <th class="col-sector">S3</th>
                <th class="col-pits">PITS</th>
            </tr>
        </thead>
        <tbody id="timing-body">
            <tr><td colspan="11" class="timing-loading">Waiting for data...</td></tr>
        </tbody>
    </table>
    </div>
    <div class="map-panel">
        <canvas id="circle-map-canvas"></canvas>
        <div class="map-detail" id="map-detail">
            <div class="map-detail-empty">Tap a driver to see details</div>
        </div>
    </div>
</div>

<script>
const COMPOUND_COLOURS = {
    SOFT:    '#e8002d',
    MEDIUM:  '#ffd700',
    HARD:    '#ffffff',
    INTER:   '#39b54a',
    WET:     '#0067ff',
    UNKNOWN: '#888888',
};

const _prevPositions = {};
const _prevLapTimes  = {};
let _initialised = false;
let _selectedDriver = null;
let _prevGaps = {};
let _gapLastVal  = {};   // abbr -> last distinct gap seconds
let _gapTrend    = {};   // abbr -> 'gap-closing' | 'gap-growing' | ''
let _intLastVal  = {};   // abbr -> last distinct interval seconds
let _intTrend    = {};   // abbr -> 'gap-closing' | 'gap-growing' | ''
let _relLastVal  = {};   // abbr -> last distinct relative gap seconds (vs selected driver)
let _relTrend    = {};   // abbr -> 'gap-closing' | 'gap-growing' | ''

document.addEventListener('f1:update', (e) => {
    const drivers = e.detail.drivers;
    if (!drivers || Object.keys(drivers).length === 0) return;

    const sorted = Object.entries(drivers)
        .filter(([, d]) => d.position != null)
        .sort(([, a], [, b]) => a.position - b.position);

    if (sorted.length === 0) return;

    const tbody = document.getElementById('timing-body');

    // Clear the "Waiting for data..." placeholder on first real data
    if (!_initialised) {
        tbody.innerHTML = '';
        _initialised = true;
    }

    const existingRows = {};
    tbody.querySelectorAll('tr[data-driver]').forEach(row => {
        existingRows[row.dataset.driver] = row;
    });

    sorted.forEach(([abbr, d], idx) => {
        let row = existingRows[abbr];
        const isNew = !row;

        if (isNew) {
            row = document.createElement('tr');
            row.dataset.driver = abbr;
        }

        const prevPos = _prevPositions[abbr];
        let posClass = '';
        if (prevPos != null && prevPos !== d.position) {
            posClass = d.position < prevPos ? 'pos-up' : 'pos-down';
        }
        _prevPositions[abbr] = d.position;

        const prevLap = _prevLapTimes[abbr];
        let lapFlash = '';
        if (prevLap != null && prevLap !== d.last_lap && d.last_lap) {
            lapFlash = 'flash';
        }
        _prevLapTimes[abbr] = d.last_lap;

        // Track gap trend — compare each new distinct value to the previous distinct value
        const rawGap = parseGapSeconds(d.gap_to_leader);
        if (rawGap !== null) {
            const prev = _gapLastVal[abbr];
            if (prev !== undefined && Math.abs(rawGap - prev) > 0.1) {
                _gapTrend[abbr] = rawGap < prev ? 'gap-closing' : 'gap-growing';
            }
            if (prev === undefined || Math.abs(rawGap - prev) > 0.001) {
                _gapLastVal[abbr] = rawGap;
            }
        }
        const rawInt = parseGapSeconds(d.interval);
        if (rawInt !== null) {
            const prev = _intLastVal[abbr];
            if (prev !== undefined && Math.abs(rawInt - prev) > 0.1) {
                _intTrend[abbr] = rawInt < prev ? 'gap-closing' : 'gap-growing';
            }
            if (prev === undefined || Math.abs(rawInt - prev) > 0.001) {
                _intLastVal[abbr] = rawInt;
            }
        }

        // Track relative gap trend when a driver is selected
        if (_selectedDriver && _selectedDriver !== abbr) {
            const refDriver = drivers[_selectedDriver];
            if (refDriver && !refDriver.in_pit) {
                const myGapSec  = parseGapSeconds(d.gap_to_leader);
                const refGapSec = parseGapSeconds(refDriver.gap_to_leader);
                if (myGapSec !== null && refGapSec !== null) {
                    const relGap = myGapSec - refGapSec;
                    const prev = _relLastVal[abbr];
                    if (prev !== undefined && Math.abs(relGap - prev) > 0.1) {
                        _relTrend[abbr] = relGap < prev ? 'gap-closing' : 'gap-growing';
                    }
                    if (prev === undefined || Math.abs(relGap - prev) > 0.001) {
                        _relLastVal[abbr] = relGap;
                    }
                }
            }
        }

        const compound = (d.compound || 'UNKNOWN').toUpperCase();
        const compoundColour = COMPOUND_COLOURS[compound] || '#888888';
        const compoundInitial = compound === 'INTER' ? 'I' : compound === 'UNKNOWN' ? '?' : compound[0];

        row.className = [
            'd-row',
            d.in_pit ? 'in-pit' : '',
            posClass,
        ].filter(Boolean).join(' ');

        row.innerHTML = `
            <td class="col-pos mono">${d.position}</td>
            <td class="col-driver">
                <span class="team-bar" style="background:${d.team_colour || '#fff'}"></span>
                <span class="driver-abbr">${abbr}</span>
                ${d.in_pit ? '<span class="pit-badge">PIT</span>' : ''}
            </td>
            <td class="col-lap mono ${lapFlash}">${d.last_lap || '—'}</td>
            <td class="col-lap mono muted">${d.best_lap || '—'}</td>
            <td class="col-gap mono ${(_selectedDriver && _selectedDriver !== abbr) ? (_relTrend[abbr] || '') : (_gapTrend[abbr] || '')}" data-gap="${d.gap_to_leader}" style="white-space:nowrap">${fmtRelGap(abbr, d, sorted, drivers)}${sparkline(d.gap_history)}</td>
            <td class="col-gap mono ${_intTrend[abbr] || ''}">${fmtGap(d.interval)}</td>
            <td class="col-tyre">
                <span class="tyre-dot" style="background:${compoundColour}"></span>
                <span class="tyre-label mono" style="color:${compoundColour}">${compoundInitial}</span>
                <span class="tyre-age mono muted">${d.tyre_life != null ? d.tyre_life : '—'}</span>
                ${d.stint_avg_lap ? `<span class="stint-avg mono">${d.stint_avg_lap}</span>` : ''}
            </td>
            <td class="col-sector mono ${sectorClass(d.sector_1, sorted, 'sector_1')}">${d.sector_1 || '—'}</td>
            <td class="col-sector mono ${sectorClass(d.sector_2, sorted, 'sector_2')}">${d.sector_2 || '—'}</td>
            <td class="col-sector mono ${sectorClass(d.sector_3, sorted, 'sector_3')}">${d.sector_3 || '—'}</td>
            <td class="col-pits mono muted">${d.pit_stops != null ? d.pit_stops : '—'}</td>
        `;

        if (isNew) {
            tbody.appendChild(row);
        } else {
            const rows = Array.from(tbody.querySelectorAll('tr[data-driver]'));
            if (rows.indexOf(row) !== idx) {
                tbody.insertBefore(row, rows[idx] || null);
            }
        }

        if (lapFlash || posClass) {
            setTimeout(() => {
                row.classList.remove('flash', 'pos-up', 'pos-down');
                row.querySelector('.col-lap')?.classList.remove('flash');
            }, 1000);
        }
    });

    Object.keys(existingRows).forEach(abbr => {
        if (!drivers[abbr]) existingRows[abbr].remove();
    });
});

function sparkline(history) {
    if (!history || history.length < 2) return '';
    const W = 40, H = 16, pad = 1;
    const min = Math.min(...history);
    const max = Math.max(...history);
    const range = max - min || 1;
    const pts = history.map((v, i) => {
        const x = pad + (i / (history.length - 1)) * (W - pad * 2);
        const y = pad + ((v - min) / range) * (H - pad * 2);
        // Invert Y: lower gap = higher on chart (better)
        return `${x.toFixed(1)},${(H - y).toFixed(1)}`;
    });
    return `<svg width="${W}" height="${H}" style="vertical-align:middle;margin-left:4px" viewBox="0 0 ${W} ${H}"><polyline points="${pts.join(' ')}" fill="none" stroke="var(--muted)" stroke-width="1.2" stroke-linejoin="round"/></svg>`;
}

function fmtGap(val) {
    if (!val || val === 'leader') return val === 'leader' ? 'LEADER' : '—';
    return val;
}

function parseGapSeconds(val) {
    if (!val || val === 'leader') return null;
    const n = parseFloat(val.replace('+', ''));
    return isNaN(n) ? null : n;
}

function fmtRelGap(abbr, d, sorted, drivers) {
    // If no driver selected, show normal gap
    if (!_selectedDriver || _selectedDriver === abbr) {
        return abbr === _selectedDriver ? '<span style="color:var(--sc-yellow)">REF</span>' : fmtGap(d.gap_to_leader);
    }

    const refDriver = drivers[_selectedDriver];
    if (!refDriver) return fmtGap(d.gap_to_leader);

    // If selected driver is in pit, fall back to gap-to-leader display
    if (refDriver.in_pit) return fmtGap(d.gap_to_leader);

    const myGap  = parseGapSeconds(d.gap_to_leader);
    const refGap = parseGapSeconds(refDriver.gap_to_leader);

    // Leader row
    if (d.gap_to_leader === 'leader') {
        if (refGap === null) return 'LEADER';
        const diff = 0 - refGap;
        return diff >= 0 ? `+${diff.toFixed(3)}` : diff.toFixed(3);
    }

    if (myGap === null || refGap === null) return fmtGap(d.gap_to_leader);

    const diff = myGap - refGap;
    if (Math.abs(diff) < 0.001) return '+0.000';
    return diff > 0 ? `+${diff.toFixed(3)}` : diff.toFixed(3);
}

function sectorClass(val, sorted, field) {
    if (!val) return '';
    const times = sorted
        .map(([, d]) => parseSector(d[field]))
        .filter(t => t != null);
    if (times.length === 0) return '';
    const best = Math.min(...times);
    const mine = parseSector(val);
    if (mine == null) return '';
    if (Math.abs(mine - best) < 0.001) return 'sector-purple';
    const sorted2 = [...times].sort((a, b) => a - b);
    if (mine === sorted2[1]) return 'sector-green';
    return '';
}

function parseSector(val) {
    if (!val) return null;
    try {
        const parts = val.split(':');
        return parseFloat(parts[0]) * 60 + parseFloat(parts[1]);
    } catch { return null; }
}
</script>
<script src="/static/js/circle_map.js"></script>
<script>
// Timing tower row click — gap compare + circle map select
document.getElementById('timing-body').addEventListener('click', function(e) {
    const row = e.target.closest('tr[data-driver]');
    if (!row) return;
    const abbr = row.dataset.driver;

    // Toggle selected driver for gap comparison
    const wasSelected = _selectedDriver === abbr;
    _selectedDriver = wasSelected ? null : abbr;

    // Reset relative trend on selection change
    _relLastVal = {};
    _relTrend   = {};

    // Highlight selected row
    document.querySelectorAll('#timing-body tr[data-driver]').forEach(r => {
        r.classList.toggle('row-selected', r.dataset.driver === _selectedDriver);
    });

    // Also sync circle map if available
    if (window._circleMap && window._circleMap.setSelected) {
        window._circleMap.setSelected(_selectedDriver);
    }
});
</script>
<script>
function switchTab(tab) {
    // Only apply tab switching on mobile
    if (window.innerWidth > 600) return;

    const timingPanel = document.querySelector('.timing-panel');
    const mapPanel    = document.querySelector('.map-panel');
    const tabTiming   = document.getElementById('tab-timing');
    const tabMap      = document.getElementById('tab-map');

    if (tab === 'timing') {
        timingPanel.style.display = 'block';
        mapPanel.style.display    = 'none';
        tabTiming.classList.add('active');
        tabMap.classList.remove('active');
    } else {
        timingPanel.style.display = 'none';
        mapPanel.style.display    = 'block';
        tabTiming.classList.remove('active');
        tabMap.classList.add('active');
        setTimeout(function() { window.dispatchEvent(new Event('resize')); }, 50);
    }
}

// Reset panel visibility on resize (e.g. rotating phone to landscape)
window.addEventListener('resize', function () {
    if (window.innerWidth > 600) {
        document.querySelector('.timing-panel').style.display = '';
        document.querySelector('.map-panel').style.display    = '';
    }
});
</script>
{% endblock %}
