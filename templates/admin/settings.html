{% extends "base.html" %}
{% block content %}
<div class="admin-page">
    <h2 class="admin-title">Settings</h2>

    {% if saved %}
    <div class="admin-notice">Settings saved.</div>
    {% endif %}

    <form method="post" action="/admin/settings" class="admin-form">

        <div class="setting-row">
            <label class="setting-label" for="pit_stop_duration">
                Pit stop duration (seconds)
                <span class="setting-hint">Used when FastF1 has no pit out time. Typical: 23-30s depending on circuit pit lane length.</span>
            </label>
            <div class="seek-row">
                <input
                    class="setting-input"
                    type="number"
                    id="pit_stop_duration"
                    name="pit_stop_duration"
                    value="{{ settings.get('pit_stop_duration', '25') }}"
                    min="15"
                    max="60"
                    step="1"
                >
                <button class="seek-btn" type="button" id="calc-pit-btn">Calculate from practice</button>
                <button class="seek-btn" type="button" id="fetch-pit-btn" style="margin-left:4px">Fetch from Pirelli</button>
                <span id="calc-pit-status" class="seek-status"></span>
            </div>
        </div>

        <div class="setting-row">
            <label class="setting-label" for="replay_speed">
                Replay speed
                <span class="setting-hint">Speed multiplier for replay. 1x = real time (~90 min). 5x = ~18 min. 10x = ~9 min. Use higher values for testing only.</span>
            </label>
            <select
                class="setting-input"
                id="replay_speed"
                name="replay_speed"
                style="width:100px"
            >
                {% for val in ['1', '2', '5', '10'] %}
                <option value="{{ val }}" {% if settings.get('replay_speed', '1') == val %}selected{% endif %}>{{ val }}x</option>
                {% endfor %}
            </select>
        </div>

        <div class="setting-row">
            <label class="setting-label" for="seek-lap-input">
                Replay seek
                <span class="setting-hint">Jump to a specific lap in the current replay session.</span>
            </label>
            <div class="seek-row">
                <input class="setting-input" type="number" id="seek-lap-input" min="1" max="100" placeholder="Lap">
                <button class="seek-btn" type="button" id="seek-btn">Jump</button>
                <span id="seek-status" class="seek-status"></span>
            </div>
        </div>

        <div class="setting-save">
            <button class="admin-btn" type="submit">Save settings</button>
        </div>

    </form>
</div>

<style>
.admin-page        { max-width: 600px; margin: 40px auto; padding: 0 20px; }
.admin-title       { color: var(--text); font-size: 1.2rem; margin-bottom: 24px; }
.admin-notice      { background: #1a3a1a; border: 1px solid #27ae60; color: #27ae60;
                     padding: 10px 16px; border-radius: 4px; margin-bottom: 20px; font-size: 0.85rem; }
.admin-form        { background: var(--surface); border: 1px solid var(--border);
                     border-radius: 6px; padding: 24px; }
.setting-row       { margin-bottom: 24px; }
.setting-label     { display: block; color: var(--text); font-size: 0.9rem;
                     margin-bottom: 8px; font-family: "JetBrains Mono", monospace; }
.setting-hint      { display: block; color: var(--muted); font-size: 0.75rem;
                     margin-top: 4px; font-family: Inter, sans-serif; }
.setting-input     { background: var(--bg); border: 1px solid var(--border); color: var(--text);
                     padding: 8px 12px; border-radius: 4px; font-size: 0.9rem; width: 100px; }
.setting-input:focus { outline: none; border-color: var(--accent); }
.seek-row          { display: flex; align-items: center; gap: 10px; }
.seek-btn          { background: var(--accent); color: #fff; border: none;
                     padding: 8px 16px; border-radius: 4px; cursor: pointer;
                     font-size: 0.85rem; font-family: "JetBrains Mono", monospace; }
.seek-btn:hover    { opacity: 0.85; }
.seek-status       { font-size: 0.8rem; font-family: "JetBrains Mono", monospace; color: #888; }
.setting-save      { border-top: 1px solid var(--border); padding-top: 20px; margin-top: 8px; display: block; width: 100%; clear: both; }
.admin-btn         { background: var(--accent); color: #fff; border: none;
                     padding: 10px 24px; border-radius: 4px; cursor: pointer;
                     font-size: 0.85rem; font-family: "JetBrains Mono", monospace; }
.admin-btn:hover   { opacity: 0.85; }
</style>

<script>
const fetchPitBtn = document.getElementById('fetch-pit-btn');
if (fetchPitBtn) {
    fetchPitBtn.addEventListener('click', async () => {
        const status = document.getElementById('calc-pit-status');
        const input  = document.getElementById('pit_stop_duration');
        fetchPitBtn.disabled = true;
        status.textContent = 'Searching Pirelli notes...';
        status.style.color = '#888';
        try {
            const res  = await fetch('/api/admin/fetch-pit-duration');
            const data = await res.json();
            if (res.ok) {
                input.value = data.estimated_pit_duration;
                status.textContent = data.note;
                status.style.color = '#27ae60';
            } else {
                status.textContent = data.detail || 'Failed.';
                status.style.color = '#e8002d';
            }
        } catch (e) {
            status.textContent = 'Request failed.';
            status.style.color = '#e8002d';
        }
        fetchPitBtn.disabled = false;
    });
}

const calcPitBtn = document.getElementById('calc-pit-btn');
if (calcPitBtn) {
    calcPitBtn.addEventListener('click', async () => {
        const status = document.getElementById('calc-pit-status');
        const input  = document.getElementById('pit_stop_duration');
        calcPitBtn.disabled = true;
        status.textContent = 'Loading practice data...';
        status.style.color = '#888';
        try {
            const res  = await fetch('/api/admin/calculate-pit-duration');
            const data = await res.json();
            if (res.ok) {
                input.value = data.estimated_pit_duration;
                status.textContent = data.note;
                status.style.color = '#27ae60';
            } else {
                status.textContent = data.detail || 'Failed.';
                status.style.color = '#e8002d';
            }
        } catch (e) {
            status.textContent = 'Request failed.';
            status.style.color = '#e8002d';
        }
        calcPitBtn.disabled = false;
    });
}

const seekBtn = document.getElementById('seek-btn');
if (seekBtn) {
    seekBtn.addEventListener('click', async () => {
        const input = document.getElementById('seek-lap-input');
        const status = document.getElementById('seek-status');
        const lap = parseInt(input.value);
        if (!lap || lap < 1) {
            status.textContent = 'Enter a valid lap number.';
            status.style.color = '#e8002d';
            return;
        }
        seekBtn.disabled = true;
        status.textContent = 'Jumping...';
        status.style.color = '#888';
        try {
            const res = await fetch(`/api/replay/seek?lap=${lap}`, { method: 'POST' });
            const data = await res.json();
            if (res.ok) {
                status.textContent = `Jumped to lap ${data.sought_to_lap}.`;
                status.style.color = '#27ae60';
            } else {
                status.textContent = data.detail || 'Failed.';
                status.style.color = '#e8002d';
            }
        } catch (e) {
            status.textContent = 'Request failed.';
            status.style.color = '#e8002d';
        }
        seekBtn.disabled = false;
    });
}
</script>
{% endblock %}
