<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Pit Wall — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/pitwall.css">
</head>
<body class="login-body">
    <div class="login-card">
        <div class="login-logo">F1 PIT WALL</div>
        <p class="login-sub">Restricted access</p>
        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}
        <form action="/login" method="post" class="login-form">
            <input type="text" name="username" placeholder="Username" required autofocus>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
